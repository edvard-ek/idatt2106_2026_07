name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build & Test
        run: |
          cd backend
          ./mvnw clean verify

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t your-app-backend:${{ github.sha }} ./backend

      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          # Example: SSH deploy, push to registry, etc.
          echo "Deploy step here"
